<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>법정의무교육 이수현황 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  /* ====================== 설정 가능한 디자인 토큰 ====================== */
  :root{
    --bg:#EEF0F4;
    --surface:#FFFFFF;
    --ink:#1B2433;
    --ink-soft:#5B6577;
    --ink-faint:#94A0B2;
    --border:#E4E5EE;
    --primary:#4F46E5;
    --primary-dark:#4338CA;
    --primary-soft:#EEF0FF;
    --primary-line:#D6D5FB;
    --accent:#1F6E5C;
    --accent-soft:#E4F2EE;
    --complete:#1F6E5C;
    --complete-bg:#E4F2EE;
    --partial:#9C6B14;
    --partial-bg:#FBF1DE;
    --none:#A23B33;
    --none-bg:#FBEAE8;
    --leave:#6B7280;
    --leave-bg:#E9EAEE;
    --radius:14px;
    --shadow:0 1px 2px rgba(30,25,80,0.05), 0 8px 24px -12px rgba(30,25,80,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
    font-feature-settings:"tnum" 1;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  button{font-family:inherit;}
  a{color:inherit;}
  ::selection{background:var(--primary-soft);}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important; animation:none !important;}
  }

  /* ====================== 레이아웃 ====================== */
  .app{
    max-width:1280px;
    margin:0 auto;
    padding:0 20px 64px;
  }
  header.top{
    padding:28px 20px 22px;
    max-width:1280px;
    margin:0 auto;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    border-bottom:1px solid var(--border);
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .brand .eyebrow{
    font-size:12.5px;
    font-weight:700;
    letter-spacing:0.06em;
    color:var(--primary);
    text-transform:uppercase;
  }
  .brand h1{
    margin:0;
    font-size:24px;
    font-weight:900;
    letter-spacing:-0.01em;
  }
  .meta-row{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:12.5px;
    color:var(--ink-faint);
  }
  .meta-row button{
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:999px;
    padding:6px 13px;
    font-size:12.5px;
    font-weight:500;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .meta-row button:hover{border-color:var(--primary-line); color:var(--primary);}
  .meta-row button:focus-visible{outline:2px solid var(--primary); outline-offset:2px;}
  .meta-row button.btn-primary{
    background:linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-color:transparent;
    color:#FFFFFF;
    font-weight:700;
  }
  .meta-row button.btn-primary:hover{color:#FFFFFF; opacity:0.92;}

  .layout{
    display:grid;
    grid-template-columns:300px 1fr;
    gap:22px;
    margin-top:22px;
  }
  @media (max-width: 880px){
    .layout{grid-template-columns:1fr;}
  }

  /* ====================== 좌측 탭 레일 ====================== */
  .shell{display:flex; align-items:flex-start; min-height:100vh;}
  .shell-main{flex:1; min-width:0;}
  .tab-rail{
    width:228px; flex:none;
    background:var(--surface);
    border-right:1px solid var(--border);
    min-height:100vh;
    position:sticky; top:0;
    display:flex; flex-direction:column;
    padding:18px 14px;
    transition:width .15s ease;
  }
  .tab-rail.collapsed{width:72px;}
  .tab-rail.collapsed .rail-brand-text, .tab-rail.collapsed .rail-item span{display:none;}
  .tab-rail.collapsed .rail-top{justify-content:center;}
  .tab-rail.collapsed .rail-collapse svg{transform:rotate(180deg);}
  .tab-rail.collapsed .rail-brand{gap:0;}
  .rail-top{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:22px;}
  .rail-brand{display:flex; align-items:center; gap:10px; min-width:0;}
  .rail-logo{
    width:34px; height:34px; border-radius:10px; flex:none;
    background:linear-gradient(135deg, var(--primary), var(--primary-dark));
    display:flex; align-items:center; justify-content:center;
  }
  .rail-brand-text{display:flex; flex-direction:column; line-height:1.35; min-width:0; overflow:hidden;}
  .rail-brand-text strong{font-size:13.5px; white-space:nowrap;}
  .rail-brand-text span{font-size:11px; color:var(--ink-faint); white-space:nowrap;}
  .rail-collapse{
    border:1px solid var(--border); background:var(--surface);
    width:26px; height:26px; border-radius:8px; flex:none;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink-faint); cursor:pointer;
  }
  .rail-collapse:hover{color:var(--primary); border-color:var(--primary-line);}
  .rail-collapse:focus-visible{outline:2px solid var(--primary); outline-offset:2px;}
  .rail-nav{display:flex; flex-direction:column; gap:4px;}
  .rail-item{
    display:flex; align-items:center; gap:10px;
    border:none; background:none;
    padding:10px; border-radius:10px;
    font-size:13px; font-weight:600;
    color:var(--ink-soft); cursor:pointer; text-align:left; white-space:nowrap;
  }
  .rail-item svg{flex:none; color:var(--ink-faint);}
  .rail-item:hover{background:var(--bg);}
  .rail-item:focus-visible{outline:2px solid var(--primary); outline-offset:2px;}
  .rail-item.active{background:var(--primary-soft); color:var(--primary);}
  .rail-item.active svg{color:var(--primary);}
  .rail-item[hidden]{display:none;}
  .rail-footer{margin-top:auto; padding-top:14px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px;}
  .rail-item.rail-footer-btn{
    border:1px solid var(--border); border-radius:10px;
    background:var(--surface); font-weight:500;
  }
  .rail-item.rail-footer-btn:hover{background:var(--bg); border-color:var(--primary-line);}
  .rail-item.rail-footer-btn.active{background:var(--primary-soft); border-color:var(--primary-line); color:var(--primary);}
  .rail-footer-icon{
    width:26px; height:26px; border-radius:7px; flex:none;
    background:var(--primary-soft); color:var(--primary);
    display:flex; align-items:center; justify-content:center;
  }
  .tab-rail.collapsed .rail-footer-btn{justify-content:center; padding:8px;}
  .tab-panel[hidden]{display:none;}
  @media (max-width:700px){
    .shell{flex-direction:column;}
    .tab-rail{
      width:100%; min-height:auto; position:relative;
      flex-direction:row; align-items:center; justify-content:space-between;
      padding:12px 16px; border-right:none; border-bottom:1px solid var(--border);
    }
    .rail-top{margin-bottom:0;}
    .rail-collapse{display:none;}
    .rail-brand-text{display:none;}
    .rail-nav{flex-direction:row; gap:6px;}
    .rail-item span{display:none;}
    .rail-footer{margin-top:0; padding-top:0; border-top:none;}
  }

  /* ====================== 사이드바 ====================== */
  .sidebar{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    align-self:start;
    box-shadow:var(--shadow);
  }
  .search-box{
    position:relative;
    margin-bottom:14px;
  }
  .search-box input{
    width:100%;
    padding:10px 12px 10px 34px;
    border-radius:10px;
    border:1px solid var(--border);
    font-size:13.5px;
    background:var(--bg);
    color:var(--ink);
  }
  .search-box input:focus-visible{outline:2px solid var(--primary); outline-offset:1px;}
  .search-box svg{position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--ink-faint);}

  .dept{border-top:1px solid var(--border);}
  .dept:first-of-type{border-top:none;}
  .division-body{display:none; padding:0 0 8px;}
  .dept.division.open > .division-body{display:block;}
  .division-head-members{
    margin:2px 0 8px;
    padding-left:8px;
    border-left:2px solid var(--primary-line);
  }
  .division-teams-label{
    font-size:10.5px; font-weight:700; letter-spacing:0.04em;
    color:var(--ink-faint); text-transform:uppercase;
    padding:4px 4px 2px;
  }
  .dept.nested{
    margin-left:12px;
    border-top:none;
    border-left:1px solid var(--border);
    padding-left:10px;
  }
  .dept.nested .dept-head{font-size:12.5px; font-weight:600; padding:8px 4px;}
  .dept-head{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:none;
    border:none;
    padding:12px 4px;
    cursor:pointer;
    font-size:14px;
    font-weight:700;
    color:var(--ink);
    text-align:left;
  }
  .dept-head:focus-visible{outline:2px solid var(--primary); outline-offset:2px; border-radius:6px;}
  .dept-head .count{font-weight:500; color:var(--ink-faint); font-size:12.5px;}
  .dept-head .chev{transition:transform .15s ease; color:var(--ink-faint);}
  .dept.open .dept-head .chev{transform:rotate(90deg);}
  .dept-list{
    list-style:none;
    margin:0 0 10px;
    padding:0;
    display:none;
  }
  .dept.open .dept-list{display:block;}
  .dept-list li{margin:0;}
  .emp-btn{
    width:100%;
    text-align:left;
    background:none;
    border:none;
    padding:8px 10px 8px 14px;
    border-radius:8px;
    font-size:13.5px;
    color:var(--ink-soft);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .emp-btn:hover{background:var(--bg); color:var(--ink);}
  .emp-btn:focus-visible{outline:2px solid var(--primary); outline-offset:1px;}
  .emp-btn.active{background:var(--primary-soft); color:var(--primary); font-weight:700;}
  .emp-btn .dot{width:7px; height:7px; border-radius:50%; flex:none;}
  .dot.complete{background:var(--complete);}
  .dot.partial{background:var(--partial);}
  .dot.none{background:var(--none);}
  .dot.leave{background:var(--leave);}

  /* ====================== 메인 패널 공통 ====================== */
  .panel{display:flex; flex-direction:column; gap:20px;}
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }

  /* 개요 화면 */
  .stat-row{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:14px;
  }
  @media (max-width:720px){.stat-row{grid-template-columns:repeat(2,1fr);}}
  .stat-card{padding:18px 18px 16px;}
  .stat-card .label{font-size:12.5px; color:var(--ink-faint); font-weight:500;}
  .stat-card .value{font-size:26px; font-weight:900; margin-top:6px; letter-spacing:-0.01em;}
  .stat-card .value.complete{color:var(--complete);}
  .stat-card .value.none{color:var(--none);}
  .stat-card .value.primary{color:var(--primary);}

  .section-title{
    font-size:15px;
    font-weight:700;
    margin:0 0 2px;
  }
  .section-sub{
    font-size:12.5px;
    color:var(--ink-faint);
    margin:0 0 14px;
  }

  .cat-overview{padding:20px 22px 22px;}
  .ring-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:12px;
    margin-top:6px;
  }
  @media (max-width:980px){.ring-grid{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:680px){.ring-grid{grid-template-columns:repeat(2,1fr);}}
  .division-grid{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:12px;
    margin-top:6px;
  }
  @media (max-width:980px){.division-grid{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:680px){.division-grid{grid-template-columns:repeat(2,1fr);}}
  .ring-card{
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 8px 12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:6px;
  }
  .ring-card-label{
    font-size:12px; font-weight:700; line-height:1.3;
    min-height:31px; display:flex; align-items:center; justify-content:center;
  }
  .ring-card-visual{position:relative; width:88px; height:88px; display:flex; align-items:center; justify-content:center;}
  .ring-card-visual .pct{position:absolute; font-size:14px; font-weight:800;}
  .ring-card-caption{font-size:11px; color:var(--ink-faint);}
  .cat-bar-row{
    display:grid;
    grid-template-columns:170px 1fr 90px;
    align-items:center;
    gap:14px;
    padding:9px 0;
    border-top:1px solid var(--border);
  }
  .cat-bar-row:first-of-type{border-top:none;}
  .cat-bar-row .name{font-size:13px; font-weight:500;}
  .bar-track{
    height:10px;
    border-radius:999px;
    background:var(--bg);
    overflow:hidden;
    display:flex;
  }
  .bar-seg{height:100%;}
  .bar-seg.complete{background:var(--complete);}
  .bar-seg.partial{background:var(--partial);}
  .cat-bar-row .frac{font-size:12.5px; color:var(--ink-faint); text-align:right; white-space:nowrap;}

  table.emp-table{width:100%; border-collapse:collapse; font-size:13.5px;}
  table.emp-table th{
    text-align:left;
    font-size:12px;
    font-weight:700;
    color:var(--ink-faint);
    padding:0 10px 10px;
    border-bottom:1px solid var(--border);
  }
  table.emp-table td{padding:11px 10px; border-bottom:1px solid var(--border);}
  table.emp-table tr.row-btn{cursor:pointer;}
  table.emp-table tr.row-btn:hover td{background:var(--bg);}
  table.emp-table tr.row-btn:focus-visible{outline:2px solid var(--primary);}
  .badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px;
  }
  .badge.complete{background:var(--complete-bg); color:var(--complete);}
  .badge.partial{background:var(--partial-bg); color:var(--partial);}
  .badge.none{background:var(--none-bg); color:var(--none);}
  .badge.leave{background:var(--leave-bg); color:var(--leave);}
  .leave-banner{
    display:flex; align-items:center; gap:10px;
    background:var(--leave-bg); color:var(--leave);
    border-radius:10px; padding:10px 14px;
    font-size:13px; font-weight:500;
    margin:0 24px 16px;
  }
  .progress-mini{width:90px; height:8px; border-radius:999px; background:var(--bg); overflow:hidden;}
  .progress-mini span{display:block; height:100%; background:var(--primary);}

  /* 개인 상세 화면 */
  .detail-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:16px;
    padding:22px 24px;
  }
  .back-btn{
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:999px;
    padding:7px 14px 7px 10px;
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-bottom:14px;
  }
  .back-btn:hover{color:var(--primary); border-color:var(--primary-line);}
  .back-btn:focus-visible{outline:2px solid var(--primary); outline-offset:2px;}
  .breadcrumb{font-size:12.5px; color:var(--ink-faint); margin-bottom:4px;}
  .detail-head h2{margin:0; font-size:22px; font-weight:900;}

  .ring-wrap{display:flex; align-items:center; gap:16px;}
  .ring-wrap .ring-num{font-size:13.5px; color:var(--ink-soft);}
  .ring-wrap .ring-num b{font-size:20px; color:var(--ink); display:block;}

  .cat-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:14px;
    padding:0 24px 24px;
  }
  @media (max-width:980px){.cat-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:620px){.cat-grid{grid-template-columns:1fr;}}

  .cat-card{
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px 16px 14px;
    background:var(--surface);
  }
  .cat-card .row1{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
  .cat-card .cname{font-size:14px; font-weight:700;}
  .cat-card .creq{font-size:11.5px; color:var(--ink-faint); margin-top:3px;}
  .cat-card .ctotal{
    font-size:19px; font-weight:900; margin:12px 0 2px; letter-spacing:-0.01em;
  }
  .cat-card .ctotal.complete{color:var(--complete);}
  .cat-card .ctotal.partial{color:var(--partial);}
  .cat-card .ctotal.none{color:var(--none);}
  .cat-card .ctotal.leave{color:var(--leave);}
  .cat-card .bar-track{margin:8px 0 12px;}
  .split-row{
    display:grid; grid-template-columns:1fr 1fr;
    border-top:1px solid var(--border);
    font-size:12px;
  }
  .split-row .cell{padding:8px 2px 0;}
  .split-row .cell + .cell{border-left:1px solid var(--border); padding-left:10px;}
  .split-row .cell .k{color:var(--ink-faint);}
  .split-row .cell .v{font-weight:700; margin-top:2px;}
  .cat-card .lastdate{font-size:11px; color:var(--ink-faint); margin-top:10px;}

  .empty-state{
    padding:60px 24px;
    text-align:center;
    color:var(--ink-faint);
  }
  .empty-state svg{margin-bottom:12px; opacity:0.5;}
  .empty-state p{margin:0; font-size:14px;}

  .banner{
    font-size:12.5px;
    background:var(--partial-bg);
    color:var(--partial);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:16px;
    display:none;
  }
  .banner.show{display:block;}
  .banner.error{background:var(--none-bg); color:var(--none);}

  .footnote{
    font-size:11.5px;
    color:var(--ink-faint);
    text-align:center;
    margin-top:30px;
  }

  /* ====================== 교육 기준·교육명 안내 ====================== */
  .modal-head{
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:14px;
    padding:20px 22px 14px;
    border-bottom:1px solid var(--border);
  }
  .modal-head h2{margin:0; font-size:17px; font-weight:800;}
  .modal-sub{margin:6px 0 0; font-size:12.5px; color:var(--ink-faint);}
  .modal-search{
    position:relative;
    margin:14px 22px 4px;
  }
  .modal-search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--ink-faint);}
  .modal-search input{
    width:100%; padding:9px 12px 9px 34px;
    border-radius:10px; border:1px solid var(--border);
    font-size:13.5px; background:var(--bg); color:var(--ink);
  }
  .modal-search input:focus-visible{outline:2px solid var(--primary); outline-offset:1px;}
  .modal-body{
    overflow-y:auto;
    padding:6px 22px 22px;
  }
  .cat-accordion{border-top:1px solid var(--border);}
  .cat-accordion:first-of-type{border-top:none;}
  .cat-accordion-head{
    width:100%;
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    background:none; border:none;
    padding:14px 2px;
    cursor:pointer;
    text-align:left;
  }
  .cat-accordion-head:focus-visible{outline:2px solid var(--primary); outline-offset:2px; border-radius:6px;}
  .cat-accordion-head .titles{display:flex; flex-direction:column; gap:2px;}
  .cat-accordion-head .cname{font-size:14.5px; font-weight:700;}
  .cat-accordion-head .creq{font-size:12px; color:var(--ink-faint);}
  .cat-accordion-head .chev{color:var(--ink-faint); transition:transform .15s ease; flex:none;}
  .cat-accordion.open .cat-accordion-head .chev{transform:rotate(90deg);}
  .cat-accordion-body{display:none; padding:0 2px 16px;}
  .cat-accordion.open .cat-accordion-body{display:block;}
  .concurrent-note{
    font-size:12px; color:var(--accent); background:var(--accent-soft);
    border-radius:8px; padding:7px 10px; margin-bottom:10px;
  }
  .offline-note{
    font-size:12px; color:var(--partial); background:var(--partial-bg);
    border-radius:8px; padding:7px 10px; margin-bottom:10px;
  }
  table.course-table{width:100%; border-collapse:collapse; font-size:12.5px;}
  table.course-table th{
    text-align:left; font-size:11px; font-weight:700; color:var(--ink-faint);
    padding:0 8px 6px; border-bottom:1px solid var(--border);
  }
  table.course-table td{padding:7px 8px; border-bottom:1px solid var(--border); color:var(--ink-soft);}

function fmtHours(h){
  const totalMin = Math.round(h * 60);
  const hh = Math.floor(totalMin / 60);
  const mm = totalMin % 60;
  if (hh <= 0) return mm + "분";
  return hh + "시간 " + String(mm).padStart(2,"0") + "분";
}

function getStatus(total, required){
  if (total <= 0) return "none";
  if (total >= required) return "complete";
  return "partial";
}

function statusLabel(s){
  if (s === "complete") return "완료";
  if (s === "partial") return "부분이수";
  if (s === "leave") return "휴직중";
  return "미이수";
}

function ringSVG(percent, color, size){
  size = size || 88;
  const stroke = 9;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.min(100, Math.max(0, percent));
  const offset = c * (1 - pct / 100);
  const center = size / 2;
  return (
    "<svg width=\"" + size + "\" height=\"" + size + "\" viewBox=\"0 0 " + size + " " + size + "\">" +
      "<circle cx=\"" + center + "\" cy=\"" + center + "\" r=\"" + r + "\" fill=\"none\" stroke=\"#EAEAF2\" stroke-width=\"" + stroke + "\"/>" +
      "<circle cx=\"" + center + "\" cy=\"" + center + "\" r=\"" + r + "\" fill=\"none\" stroke=\"" + color + "\" stroke-width=\"" + stroke + "\" stroke-linecap=\"round\" stroke-dasharray=\"" + c + "\" stroke-dashoffset=\"" + offset + "\" transform=\"rotate(-90 " + center + " " + center + ")\"/>" +
    "</svg>"
  );
}

function normalizeRows(rawRows){
  const byEmployee = new Map();
  const deptOrder = [];
  const deptMembers = new Map();

  rawRows.forEach(r => {
    const dept = (r["부서"] || "미배정").trim();
    const name = (r["직원명"] || "").trim();
    const cat = (r["법정의무교육명"] || "").trim();
    if (!name || !cat) return;
    const elearn = parseFloat(r["이러닝시간"]) || 0;
    const offline = parseFloat(r["집합교육시간"]) || 0;
    const last = (r["최종이수일자"] || "").trim();
    const note = (r["비고"] || "").trim();
    const onLeave = (r["재직상태"] || "").trim() === "휴직";

    if (!byEmployee.has(name)){
      byEmployee.set(name, { name, dept, onLeave, byCategory: new Map() });
    }
    const emp = byEmployee.get(name);
    if (onLeave) emp.onLeave = true;
    emp.byCategory.set(cat, {
      elearn, offline, total: Math.round((elearn+offline)*100)/100, last, note
    });

    if (!deptOrder.includes(dept)) deptOrder.push(dept);
    if (!deptMembers.has(dept)) deptMembers.set(dept, []);
    if (!deptMembers.get(dept).includes(name)) deptMembers.get(dept).push(name);
  });

  return { byEmployee, deptOrder, deptMembers };
}

    }
    byEmployee.get(name).byCategory.set(cat, {
      elearn, offline, total: Math.round((elearn+offline)*100)/100, last, note
    });
  });
  return byEmployee;
}

function employeeSummary(emp){
  if (emp.onLeave){
    return {complete:0, partial:0, none:0, leave:CATEGORIES.length, total:CATEGORIES.length};
  }
  let complete=0, partial=0, none=0;
  CATEGORIES.forEach(c=>{
    const rec = emp.byCategory.get(c.name);
    const total = rec ? rec.total : 0;
    const st = getStatus(total, c.requiredHours);
    if (st==="complete") complete++; else if (st==="partial") partial++; else none++;
  });
  return {complete, partial, none, leave:0, total: CATEGORIES.length};
}

function overallStatusOfEmployee(emp){
  if (emp.onLeave) return "leave";
  const s = employeeSummary(emp);
  if (s.none>0) return "none";
  if (s.partial>0) return "partial";
  return "complete";
}

function makeDeptNode(label, members, opts){
  opts = opts || {};
  const el = document.createElement("div");
  el.className = "dept" + (opts.extraClass ? " " + opts.extraClass : "") + (opts.forceOpen ? " open" : "");

  const head = document.createElement("button");
  head.className = "dept-head";
  head.type = "button";
  head.innerHTML = `<span>${label}</span><span style="display:flex;align-items:center;gap:8px;"><span class="count">${members.length}명</span><svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="9 18 15 12 9 6"/></svg></span>`;
  head.addEventListener("click", ()=>{ el.classList.toggle("open"); });

  const list = document.createElement("ul");
  list.className = "dept-list";
  members.forEach(name=>{
    const emp = STATE.byEmployee.get(name);
    const st = overallStatusOfEmployee(emp);
    const li = document.createElement("li");
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "emp-btn" + (STATE.selected===name ? " active" : "");
    btn.innerHTML = `<span>${name}</span><span class="dot ${st}"></span>`;
    btn.addEventListener("click", ()=>{ selectEmployee(name); });
    li.appendChild(btn);
    list.appendChild(li);
  });

  el.appendChild(head);
  el.appendChild(list);
  return el;
}

function renderSidebar(){
  const wrap = document.getElementById("deptList");
  wrap.innerHTML = "";
  const query = (document.getElementById("searchInput").value || "").trim();

  ORG_STRUCTURE.forEach(node=>{
    if (node.type === "leaf"){
      const members = STATE.deptMembers.get(node.dept) || [];
      const filtered = query ? members.filter(n=>n.includes(query)) : members;
      if (query && filtered.length===0) return;
      wrap.appendChild(makeDeptNode(node.dept, filtered, {forceOpen: !!query}));
      return;
    }

    // division (본부): 본부 직속 인원(본부장 등) + 산하 팀
    const headMembers = STATE.deptMembers.get(node.dept) || [];
    const headFiltered = query ? headMembers.filter(n=>n.includes(query)) : headMembers;

    const teamData = node.teams.map(t=>{
      const members = STATE.deptMembers.get(t.dept) || [];
      const filtered = query ? members.filter(n=>n.includes(query)) : members;
      return { dept:t.dept, members, filtered };
    });

    const totalCount = headMembers.length + teamData.reduce((sum,t)=>sum+t.members.length, 0);
    const totalFilteredCount = headFiltered.length + teamData.reduce((sum,t)=>sum+t.filtered.length, 0);
    if (query && totalFilteredCount === 0) return;

    const divEl = document.createElement("div");
    divEl.className = "dept division" + (query ? " open" : "");

    const head = document.createElement("button");
    head.className = "dept-head";
    head.type = "button";
    head.innerHTML = `<span>${node.dept}</span><span style="display:flex;align-items:center;gap:8px;"><span class="count">${query ? totalFilteredCount : totalCount}명</span><svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="9 18 15 12 9 6"/></svg></span>`;
    head.addEventListener("click", ()=>{ divEl.classList.toggle("open"); });
    divEl.appendChild(head);

    const body = document.createElement("div");
    body.className = "division-body";

    if (headFiltered.length){
      const list = document.createElement("ul");
      list.className = "dept-list division-head-members";
      headFiltered.forEach(name=>{
        const emp = STATE.byEmployee.get(name);
        const st = overallStatusOfEmployee(emp);
        const li = document.createElement("li");
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "emp-btn" + (STATE.selected===name ? " active" : "");
        btn.innerHTML = `<span>${name}</span><span class="dot ${st}"></span>`;
        btn.addEventListener("click", ()=>{ selectEmployee(name); });
        li.appendChild(btn);
        list.appendChild(li);
      });
      body.appendChild(list);
    }

    let teamsLabelAdded = false;
    teamData.forEach((t) => {
      const teamMembers = query ? t.filtered : t.members;
      if (query && t.filtered.length===0) return;
      if (!teamsLabelAdded && node.teamsLabel){
        const label = document.createElement("div");
        label.className = "division-teams-label";
        label.textContent = node.teamsLabel;
        body.appendChild(label);
        teamsLabelAdded = true;
      }
      body.appendChild(makeDeptNode(t.dept, teamMembers, {extraClass:"nested", forceOpen: !!query}));
    });

    divEl.appendChild(body);
    wrap.appendChild(divEl);
  });
}

function renderOverview(){
  const main = document.getElementById("mainPanel");
  const employees = Array.from(STATE.byEmployee.values());
  const n = employees.length;
  const activeEmployees = employees.filter(emp => !emp.onLeave);
  const nActive = activeEmployees.length;
  const leaveCount = n - nActive;

  let fullyComplete=0, anyNone=0;
  const catCounts = {};
  CATEGORIES.forEach(c=>catCounts[c.name]={complete:0,partial:0,none:0});

  activeEmployees.forEach(emp=>{
    const s = employeeSummary(emp);
    if (s.none===0 && s.partial===0) fullyComplete++;
    if (s.none>0) anyNone++;
    CATEGORIES.forEach(c=>{
      const rec = emp.byCategory.get(c.name);
      const total = rec ? rec.total : 0;
      const st = getStatus(total, c.requiredHours);
      catCounts[c.name][st]++;
    });
  });

  const avgRate = nActive ? Math.round(activeEmployees.reduce((sum,emp)=>{
    const s = employeeSummary(emp);
    return sum + (s.complete / s.total);
  },0) / nActive * 100) : 0;

  const divisionStats = ORG_STRUCTURE.map(node=>{
    const depts = node.type === "leaf" ? [node.dept] : [node.dept].concat(node.teams.map(t=>t.dept));
    let names = [];
    depts.forEach(d=>{ names = names.concat(STATE.deptMembers.get(d) || []); });
    const active = names.map(nm=>STATE.byEmployee.get(nm)).filter(emp=>emp && !emp.onLeave);
    const cnt = active.length;
    const avg = cnt ? Math.round(active.reduce((sum,emp)=>{
      const s = employeeSummary(emp);
      return sum + (s.complete/s.total);
    },0) / cnt * 100) : 0;
    return { label: node.dept, count: cnt, avg };
  });

  if (n === 0){
    main.innerHTML = `
      <div class="card empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/></svg>

      </div>`;
    return;
  }

  let html = `
    <div class="stat-row">
      <div class="card stat-card"><div class="label">전체 인원</div><div class="value primary">${n}명${leaveCount ? ` <span style="font-size:12px;font-weight:500;color:var(--ink-faint);">(휴직 ${leaveCount})</span>` : ""}</div></div>
      <div class="card stat-card"><div class="label">평균 이수율</div><div class="value primary">${avgRate}%</div></div>
      <div class="card stat-card"><div class="label">전 항목 완료</div><div class="value complete">${fullyComplete}명</div></div>
      <div class="card stat-card"><div class="label">미이수 항목 보유</div><div class="value none">${anyNone}명</div></div>
    </div>

    <div class="card cat-overview">
      <h3 class="section-title">부서별 이수 현황</h3>
      <p class="section-sub">본부(직속부서) 단위 평균 이수율 · 휴직자 제외</p>
      <div class="division-grid">
        ${divisionStats.map(d=>{
          return `<div class="ring-card">
            <div class="ring-card-label">${d.label}</div>
            <div class="ring-card-visual">
              ${ringSVG(d.avg, "var(--primary)")}
              <span class="pct" style="color:var(--primary)">${d.avg}%</span>
            </div>
            <div class="ring-card-caption">${d.count}명</div>
          </div>`;

      </div>
    </div>

    <div class="card cat-overview">
      <h3 class="section-title">카테고리별 이수 현황</h3>
      <p class="section-sub">재직 ${nActive}명 기준 · 완료 인원 비율 (휴직자 제외)</p>
      <div class="ring-grid">
        ${CATEGORIES.map(c=>{
          const cc = catCounts[c.name];

          return `<div class="ring-card">

function applyRows(rawRows){
  const norm = normalizeRows(rawRows);
  STATE.byEmployee = norm.byEmployee;
  STATE.deptOrder = norm.deptOrder;
  STATE.deptMembers = norm.deptMembers;

  document.getElementById("updatedAt").textContent = "업데이트 " + new Date().toLocaleString("ko-KR");

  renderSidebar();
  if (STATE.selected && STATE.byEmployee.has(STATE.selected)){
    renderDetail(STATE.selected);
  } else {
    renderOverview();
  }
}

function loadData(){
  document.getElementById("updatedAt").textContent = "불러오는 중…";
  const banner = document.getElementById("banner");

  if (!CONFIG.SHEET_CSV_URL){
    banner.textContent = "CONFIG.SHEET_CSV_URL이 설정되지 않았습니다. 구글시트를 웹에 게시한 CSV 주소를 입력해 주세요.";
    banner.className = "banner show error";
    applyRows([]);
    return;
  }
  const url = CONFIG.SHEET_CSV_URL + (CONFIG.SHEET_CSV_URL.includes("?") ? "&" : "?") + "_t=" + Date.now();
  Papa.parse(url, {
    download:true,
    header:true,
    skipEmptyLines:true,
    complete:(results)=>{
      if (!results.data || results.data.length===0){
        banner.textContent = "시트에서 데이터를 찾지 못했습니다. 컬럼명을 확인해 주세요.";
        banner.className = "banner show error";
        applyRows([]);
        return;
      }
      banner.className = "banner";
      applyRows(results.data);
    },
    error:()=>{
      banner.textContent = "구글시트 연동에 실패했습니다. SHEET_CSV_URL 또는 공개(웹에 게시) 설정을 확인해 주세요.";
      banner.className = "banner show error";
      applyRows([]);
    }
  });
}

    download:true,
    header:true,
    skipEmptyLines:true,
    complete:(results)=>{
      STATE.departedByEmployee = normalizeDepartedRows(results.data || []);
      renderDepartedSidebarList();
      if (STATE.departedSelected && STATE.departedByEmployee.has(STATE.departedSelected)){
        renderDepartedDetail(STATE.departedSelected);
      } else {
        renderDepartedOverview();
      }
    },
    error:()=>{
      STATE.departedByEmployee = new Map();
      renderDepartedSidebarList();
      renderDepartedOverview();
    }
  });
}

document.getElementById("pageTitle").textContent = CONFIG.YEAR + "년 법정의무교육 이수현황";
document.getElementById("searchInput").addEventListener("input", renderSidebar);
document.getElementById("refreshBtn").addEventListener("click", loadData);

/* ====================== 교육 기준·교육명 참고 모달 ====================== */

function renderCatAccordion(c, entry, courses, openByDefault){
  let table;
  if (courses.length){
    let rows = "";
    for (let i=0;i<courses.length;i++){
      const co = courses[i];
      rows += "<tr><td class=\"cname-cell\">" + (co.name||"") + "</td><td>" + (co.provider||"-") + "</td><td>" + (co.duration||"-") + "</td></tr>";
    }
    table = "<table class=\"course-table\"><thead><tr><th>교육명</th><th>제공기관</th><th>소요시간</th></tr></thead><tbody>" + rows + "</tbody></table>";
  } else {
    table = "<p style=\"font-size:12.5px;color:var(--ink-faint);\">등록된 이러닝 과정이 없습니다. 오프라인(집합교육)으로 진행됩니다.</p>";
  }
  const offlineNoteHtml = entry.offlineNote ? ("<div class=\"offline-note\">" + entry.offlineNote + "</div>") : "";
  const concurrentHtml = entry.concurrentDept ? ("<div class=\"concurrent-note\">오프라인 자체교육으로도 인정됨 — 담당: " + entry.concurrentDept + "</div>") : "";
  return (
    "<div class=\"cat-accordion" + (openByDefault ? " open" : "") + "\">" +
      "<button type=\"button\" class=\"cat-accordion-head\">" +
        "<span class=\"titles\"><span class=\"cname\">" + c.label + "</span><span class=\"creq\">" + c.requirement + "</span></span>" +
        "<svg class=\"chev\" width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><polyline points=\"9 18 15 12 9 6\"/></svg>" +
      "</button>" +
      "<div class=\"cat-accordion-body\">" + offlineNoteHtml + concurrentHtml + table + "</div>" +
    "</div>"
  );
}

function renderGeneralNotes(){
  if (!CATALOG_GENERAL_NOTES || !CATALOG_GENERAL_NOTES.length) return "";
  let items = "";
  for (let i=0;i<CATALOG_GENERAL_NOTES.length;i++){
    items += "<li>" + CATALOG_GENERAL_NOTES[i] + "</li>";
  }
  return "<div class=\"catalog-general-notes\"><div class=\"gn-title\">유의사항</div><ul>" + items + "</ul></div>";
}

function wireAccordionToggles(){
  const heads = document.querySelectorAll("#catalogBody .cat-accordion-head");
  for (let i=0;i<heads.length;i++){
    heads[i].addEventListener("click", (function(headEl){
      return function(){ headEl.parentElement.classList.toggle("open"); };
    })(heads[i]));
  }
}

function renderCatalogModal(filterQuery){
  const body = document.getElementById("catalogBody");
  const q = (filterQuery || "").trim().toLowerCase();
  let html = "";
  let anyMatch = false;

  for (let i=0;i<CATEGORIES.length;i++){
    const c = CATEGORIES[i];
    const entry = (COURSE_CATALOG.catalog && COURSE_CATALOG.catalog[c.name]) || {courses:[], offlineNote:null, concurrentDept:null};
    const courses = entry.courses || [];
    const catNameMatch = !q || c.label.toLowerCase().includes(q) || c.name.toLowerCase().includes(q);
    const filteredCourses = q ? courses.filter(co => (co.name||"").toLowerCase().includes(q)) : courses;
    const show = !q || catNameMatch || filteredCourses.length > 0;
    if (!show) continue;
    anyMatch = true;
    const coursesToRender = (q && !catNameMatch) ? filteredCourses : courses;
    html += renderCatAccordion(c, entry, coursesToRender, !!q);
  }

  if (!anyMatch){
    body.innerHTML = "<div class=\"no-match\">검색 결과가 없습니다.</div>" + renderGeneralNotes();
    return;
  }
  html += renderGeneralNotes();
  body.innerHTML = html;
  wireAccordionToggles();
}

function switchTab(tabName){
  const items = document.querySelectorAll(".rail-item");
  for (let i=0;i<items.length;i++){
    items[i].classList.toggle("active", items[i].getAttribute("data-tab") === tabName);
  }
  const panels = document.querySelectorAll(".tab-panel");
  for (let i=0;i<panels.length;i++){
    const isMatch = panels[i].id === "tabPanel-" + tabName;
    if (isMatch) panels[i].removeAttribute("hidden");
    else panels[i].setAttribute("hidden","");
  }
}

const railItems = document.querySelectorAll(".rail-item");
for (let i=0;i<railItems.length;i++){
  railItems[i].addEventListener("click", function(){
    switchTab(this.getAttribute("data-tab"));
  });
}

document.getElementById("railCollapseBtn").addEventListener("click", function(){
  document.getElementById("tabRail").classList.toggle("collapsed");
});

document.getElementById("catalogSearch").addEventListener("input", function(e){
  renderCatalogModal(e.target.value);
});

document.getElementById("departedSearchInput").addEventListener("input", renderDepartedSidebarList);

renderCatalogModal("");
loadData();
loadDepartedData();
</script>
